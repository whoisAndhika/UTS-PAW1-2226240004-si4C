<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatatanBelanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Catatan Belanja</h1>
        <div class="mb-3">
            <label for="Nama Barang" class="form-label">Nama Barang</label>
            <input type="text" class="form-control" id="Nama Barang">
        </div>
        <div class="mb-3">
            <label for="Jumlah Barang" class="form-label">Jumlah Barang</label>
            <input type="number" class="form-control" id="Jumlah Barang">
        </div>
        <div class="mb-3">
            <label for="Keterangan Barang" class="form-label">Keterangan Barang</label>
            <textarea class="form-control" id="Keterangan Barang"></textarea>
        </div>
        <button onclick="simpan()" class="btn btn-primary">Simpan</button>

        <p id="JumlahBarang"></p>
        <div id="list-Barang" class="row"></div>
    </div>

    <script src="scriptls.js"></script>
    <script src="script.js"></script>
</body>
</html>
