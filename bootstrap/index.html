<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatatanBelanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid">
        <h1 class="text-center text-uppercase">Catatan Belanja</h1>
        <ul class="nav nav-underline justify-content-center mb-2">
        </ul>

        <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://via.placeholder.com/800x400" class="d-block w-100" alt="Placeholder">
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="Nama Barang" class="form-label">Nama Barang</label>
                    <input type="text" class="form-control" id="Nama Barang">
                </div>
                <div class="mb-3">
                    <label for="Jumlah Barang" class="form-label">Jumlah Barang</label>
                    <input type="number" class="form-control" id="Jumlah Barang">
                </div>
                <div class="mb-3">
                    <label for="Keterangan Barang" class="form-label">Keterangan Barang</label>
                    <textarea class="form-control" id="Keterangan Barang"></textarea>
                </div>
                <button onclick="simpan()" class="btn btn-primary">Simpan</button>
            </div>
        </div>

        <div class="row mt-2">
            <div class="container text-center">
                <div class="row">
                    <div class="col">Item</div>
                    <div class="col">Jumlah</div>
                </div>
            </div>
        </div>

        <div id="list-Barang" class="row mt-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="scriptls.js"></script> 
</body>
</html>
